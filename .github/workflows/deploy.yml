name: CI/CD Deploy (Voda Develop Merge) 🚀

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

concurrency:
  group: deploy-develop
  cancel-in-progress: true

jobs:
  ci:
    name: CI Check
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22 # 💡 안정적인 LTS로 교체!
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 빌드가 성공하는지 미리 체크하는 과정, 아주 중요합니다. 🛡️
      - name: Build Check
        run: npm run build

  deploy:
    name: Build Image and Deploy
    if: github.event.pull_request.merged == true
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/voda-api:develop
            ${{ secrets.DOCKER_USERNAME }}/voda-api:${{ github.sha }}
          cache-from: type=gha,scope=develop
          cache-to: type=gha,scope=develop,mode=max

      - name: Deploy to server 🏗️
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ~/voda-backend # 💡 실제 EC2 내 프로젝트 경로로 수정!
            docker compose pull
            docker compose up -d --remove-orphans